# Credentials template — copy to inventory/credentials.yml (gitignored) and fill in real values.
# NEVER commit a filled-in copy. Put real secrets ONLY in credentials.yml.
# Placeholders in CAPS (e.g. HYPERVISOR_IP, CLEARPASS_IP) and "REPLACE_ME" must be set to your values.

# ---- Phase 1 (Mist) ----
mist:
  mist_api_token:
    api_token: "REPLACE_ME"          # scoped Mist API token
    org_id: "REPLACE_ME"             # your Mist org id

# ---- Phase 2 (ClearPass NAC) — add only when deploying NAC ----
esxi:
  esxi_admin:
    username: "root"
    password: "REPLACE_ME"           # hypervisor root password
    govc_url: "https://HYPERVISOR_IP"
    govc_insecure: true              # self-signed cert (lab)

clearpass:
  clearpass_api:
    client_id: "cowork-lab-automation"
    client_secret: "REPLACE_ME"      # set via scripts/set_clearpass_api_secret.py; append /api/oauth for tokens
    base_url: "https://CLEARPASS_IP"
    verify_tls: false
  radius:
    clearpass_host: "CLEARPASS_IP"
    clearpass_shared_secret: "REPLACE_ME"   # Mist <-> ClearPass RADIUS shared secret
